<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" role="img" aria-label="SMM Turk">
  <defs>
    <linearGradient id="bg" x1="6" y1="2" x2="34" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4D5E"/>
      <stop offset="45%" stop-color="#E30A17"/>
      <stop offset="100%" stop-color="#8B050F"/>
    </linearGradient>
    <linearGradient id="shine" x1="20" y1="0" x2="20" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mark" x1="12" y1="10" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F2F4"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="11" fill="url(#bg)"/>
  <rect width="40" height="40" rx="11" fill="url(#shine)"/>
  <rect x="1.25" y="1.25" width="37.5" height="37.5" rx="9.75" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="1"/>
  <!-- T = Turk -->
  <path d="M11 13.5h12" stroke="url(#mark)" stroke-width="4.2" stroke-linecap="round"/>
  <path d="M17 13.5v8.8" stroke="url(#mark)" stroke-width="4.2" stroke-linecap="round"/>
  <!-- Growth arrow -->
  <path d="M17 22.3l-3.8-3.5M17 22.3l6.2-5.8M17 22.3v5.7" stroke="url(#mark)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Social nodes -->
  <circle cx="28" cy="17" r="2.3" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="31.5" cy="24" r="2.7" fill="#FFFFFF"/>
  <circle cx="27.5" cy="28.5" r="2" fill="#FFFFFF" opacity="0.85"/>
</svg>
